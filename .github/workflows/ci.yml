name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-prove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build
        run: lake build

      - name: Tests
        run: |
          for t in model parse record nonce handshake e2e crypto conn config close https hardening hacl keyschedule realprovider scheduledriver provision wire flight realhandshake record13 socket; do
            lake exe "kroopt-$t-test"
          done

      - name: Parser fuzz
        run: lake exe kroopt-parse-fuzz 40000

      - name: Ed25519 CertificateVerify interop (HACL* vs OpenSSL)
        run: bash scripts/ed25519-interop.sh
      - name: TLS 1.3 record-layer interop (kroopt Record13 vs Python cryptography)
        run: bash scripts/record-interop.sh

      - name: Hygiene gate (no sorry/axiom/unsafe in strict zones)
        run: ./scripts/check-hygiene.sh

      - name: Dependency gate (pure zones import no runtime/native/transport)
        run: ./scripts/check-deps.sh

      - name: Axiom gate (no sorryAx; whitelisted axioms only)
        run: ./scripts/check-axioms.sh
