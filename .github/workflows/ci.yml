name: ci

on:
  push:
    branches: [main]
  pull_request:

# CI runs the SAME canonical gate as release (scripts/gate.sh), so the development
# gate and the release gate can never diverge (RFC 030). The release workflow calls
# the identical script with --profile full-release; the sidecar's gates[] is a direct
# transcription of this ledger.
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install gate dependencies (interop/sanitizer harnesses)
        run: |
          python3 -m pip install --break-system-packages cryptography
          # gcc/clang (ASan/UBSan), openssl, and curl are present on ubuntu-latest runners.

      - name: Run canonical gate (scripts/gate.sh, full-release profile)
        run: bash scripts/gate.sh --profile full-release

      - name: Release-machinery regression tests (gate exit-code + canonical-ledger guards)
        run: |
          bash scripts/gate.sh --selftest-passdetect
          bash scripts/check-release-machinery.sh

      - name: Upload gate ledger + per-gate logs
        if: always()                       # retain the ledger + logs even when a gate fails
        uses: actions/upload-artifact@v4
        with:
          name: gate-out-${{ github.run_id }}-${{ github.run_attempt }}
          path: gate-out/
          retention-days: 90
